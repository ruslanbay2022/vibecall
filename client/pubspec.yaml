name: vibecall
description: VibeCall — Skype-like cross-platform app
publish_to: 'none'
version: 0.1.3+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  supabase_flutter: ^2.9.0
  livekit_client: ^2.7.0
  flutter_webrtc: ^1.4.0
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  go_router: ^17.2.0
  sentry_flutter: ^9.20.0
  permission_handler: ^12.0.0
  cached_network_image: ^3.4.0
  url_launcher: ^6.3.0
  equatable: ^2.0.5
  logger: ^2.4.0
  image_picker: ^1.1.2
  audioplayers: ^6.7.0
  web: ^1.1.0
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0
  freezed: ^3.2.0
  json_serializable: ^6.13.0
  # custom_lint and riverpod_lint are temporarily disabled:
  # custom_lint 0.8.x pins analyzer ^7.5 / ^8, while json_serializable 6.11+
  # requires analyzer >=9. Re-enable once custom_lint adds analyzer 9 support.
  # See PLAN.md §13 (deferred).
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/incoming_ring.wav
    - assets/sounds/message_notification.wav
