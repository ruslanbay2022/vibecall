services:
  livekit:
    image: livekit/livekit-server:v1.7.2
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    volumes:
      - ./livekit-dev.yaml:/etc/livekit.yaml:ro
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # host network is unreliable on Docker Desktop (Windows). Reach LiveKit via host.docker.internal.
    # In Cloudflare Zero Trust → Public Hostname → Service URL:
    #   http://host.docker.internal:7880
    command: tunnel --no-autoupdate --protocol http2 run --token ${CF_TUNNEL_TOKEN}
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TUNNEL_TRANSPORT_PROTOCOL: http2
