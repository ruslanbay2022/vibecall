services:
  livekit:
    image: livekit/livekit-server:v1.7.2
    restart: always
    network_mode: host
    env_file: .env
    volumes:
      - ./livekit-prod.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml

  caddy:
    image: caddy:2-alpine
    restart: always
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
