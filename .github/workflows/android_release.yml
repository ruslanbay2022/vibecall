name: android release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      PROD_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Require release secrets
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_STORE_PASSWORD" || { echo "Missing ANDROID_STORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }
          test -n "$PROD_SUPABASE_URL" || { echo "Missing PROD_SUPABASE_URL"; exit 1; }
          test -n "$PROD_SUPABASE_ANON_KEY" || { echo "Missing PROD_SUPABASE_ANON_KEY"; exit 1; }

      - name: Decode keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> $GITHUB_ENV

      - name: Pub get
        run: flutter pub get

      - name: Build codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${PROD_SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${PROD_SUPABASE_ANON_KEY}" \
            --dart-define=ENV=prod

      - name: Rename artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk ../vibecall-android-${{ github.ref_name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: vibecall-android-${{ github.ref_name }}
          path: vibecall-android-${{ github.ref_name }}.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.apk
          generate_release_notes: true
          overwrite_files: false
