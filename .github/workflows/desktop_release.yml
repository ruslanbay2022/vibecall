name: desktop release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    defaults:
      run:
        working-directory: client
    env:
      CI_SUPABASE_URL: https://stub.supabase.co
      CI_SUPABASE_ANON_KEY: stub-anon-key-ci
      CI_ENV: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop deps
        if: matrix.target == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            git \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            libcurl4-openssl-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Pub get
        shell: bash
        run: flutter pub get

      - name: Build codegen (riverpod + freezed)
        shell: bash
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build ${{ matrix.target }} (release)
        shell: bash
        run: |
          flutter build ${{ matrix.target }} --release \
            --dart-define=SUPABASE_URL=${{ env.CI_SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ env.CI_SUPABASE_ANON_KEY }} \
            --dart-define=ENV=${{ env.CI_ENV }}

      - name: Zip Linux bundle
        if: matrix.target == 'linux'
        shell: bash
        run: |
          cd build/linux/x64/release
          zip -r ../../../../../vibecall-linux-x64-${{ github.ref_name }}.zip bundle

      - name: Zip Windows build
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ../vibecall-windows-x64-${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: vibecall-${{ matrix.target }}-${{ github.ref_name }}
          path: vibecall-*-${{ github.ref_name }}.zip

  release:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
          generate_release_notes: true
